{% extends 'base.html' %}

{% block title %}Bad Request - Streaming Site{% endblock %}

{% block content %}
<div style="text-align: center; padding: 80px 20px;">
    <div style="font-size: 120px; margin-bottom: 20px; opacity: 0.5;">⚠️</div>
    <h1 style="font-size: 36px; margin-bottom: 20px; color: #fff;">Bad Request</h1>
    
    <div style="background: #2a2a2a; padding: 30px; border-radius: 10px; margin: 30px auto; max-width: 600px;">
        <p style="color: #ccc; font-size: 18px; margin-bottom: 20px;">
            The request could not be understood by the server. Please check your input and try again.
        </p>
        
        <div style="margin-top: 30px;">
            <a href="{% url 'streaming:home' %}" 
               style="display: inline-block; padding: 12px 30px; background: #e50914; color: white; text-decoration: none; border-radius: 5px; font-weight: bold;">
                ← Back to Home
            </a>
            
            <a href="javascript:history.back()" 
               style="display: inline-block; padding: 12px 30px; background: #555; color: white; text-decoration: none; border-radius: 5px; font-weight: bold; margin-left: 10px;">
                ← Go Back
            </a>
        </div>
    </div>
</div>
{% endblock %}
